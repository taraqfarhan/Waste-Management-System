<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — RCC Waste Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-bg">

  <nav>
    <a class="brand" href="index.html">
      <img src="images/rcc_logo.png" class="brand-logo" alt="RCC Logo">
      <div class="brand-text">
        Waste Management System
        <span>Rajshahi City Corporation</span>
      </div>
    </a>
    <div class="nav-links">
      <a class="nav-btn" href="index.html"    data-page="index.html">Home</a>
      <a class="nav-btn" href="about.html"    data-page="about.html">About</a>
      <a class="nav-btn" href="stations.html" data-page="stations.html">Stations</a>
      <a class="nav-btn" href="map.html"      data-page="map.html">Map</a>
    </div>
  </nav>

  <div class="page-body">

    <div class="page-header">
      <div class="page-eyebrow">Station Locations</div>
      <h1 class="page-title">Interactive<br><strong>Map</strong></h1>
      <div class="page-line"></div>
    </div>

    <p class="map-hint">
      Scroll to zoom &nbsp;·&nbsp; Click to zoom in &nbsp;·&nbsp;
      Right-click to zoom out &nbsp;·&nbsp; Mouse leaves to reset
    </p>

    <div class="map-frame">
      <img id="mapImg" src="images/map.png" alt="Map of Secondary Transfer Stations in Rajshahi">
    </div>

  </div>

  <footer>© Rajshahi City Corporation — Waste Management System</footer>

  <script src="js/app.js"></script>
  <script>
    (function () {
      const img = document.getElementById('mapImg');
      let scale = 1;
      const clamp = (v, mn, mx) => Math.min(Math.max(v, mn), mx);

      img.addEventListener('wheel', e => {
        e.preventDefault();
        scale = clamp(scale + (e.deltaY < 0 ? 0.12 : -0.12), 0.5, 4);
        img.style.transform = `scale(${scale})`;
      });
      img.parentElement.addEventListener('mouseleave', () => {
        scale = 1;
        img.style.transform = 'scale(1)';
      });
      img.addEventListener('click', () => {
        scale = clamp(scale + 0.2, 0.5, 4);
        img.style.transform = `scale(${scale})`;
      });
      img.addEventListener('contextmenu', e => {
        e.preventDefault();
        scale = clamp(scale - 0.2, 0.5, 4);
        img.style.transform = `scale(${scale})`;
      });
    })();
  </script>
</body>
</html>
